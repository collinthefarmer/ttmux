# requires tmux >= 3.2 (display-popup, source-file -F, set-option -F, allow-passthrough)
run-shell 'v=$(tmux -V | sed "s/[^0-9.]//g"); major=${v%%.*}; minor=${v#*.}; minor=${minor%%.*}; if [ "$major" -lt 3 ] || { [ "$major" -eq 3 ] && [ "$minor" -lt 2 ]; }; then tmux display-message "ttmux: WARNING — requires tmux >= 3.2 (found $(tmux -V))"; fi'

# vars
set-option -sF @dirProjects "~/projects"
run-shell 'tmux set-option -s @cmdAgent "${TTMUX_AGENT:-copilot}"'
set-option -sF @agentContextLines "10"

# global vars
set-option -sF @dirTtmux "#{d:current_file}"
set-option -sF @dirPrograms "#{@dirTtmux}/programs"
run-shell 'dir="${XDG_RUNTIME_DIR:-${TMPDIR:-/tmp}}/ttmux" && mkdir -p "$dir" && tmux set-option -s @dirRuntime "$dir"'

source-file -F "#{@dirTtmux}/init.tmux.conf"
source-file -F "#{@dirTtmux}/bindings.tmux.conf"
run-shell "#{@dirTtmux}/scripts/bind-programs '#{@dirTtmux}'"
source-file -F "#{@dirTtmux}/options.tmux.conf"

# colorscheme: re-apply terminal palette on session switch
run-shell "#{@dirTtmux}/scripts/colorscheme hook-init \"#{@dirTtmux}\""

display-message "ttmux initialized"
