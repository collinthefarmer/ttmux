# prompt for a format string, expand it, and log the result
command-prompt -p "format string:" \
"run-shell \"echo 'EXPAND: %1' >> #{@dirRuntime}/debug.log && echo '     -> '$(tmux display-message -p '%1') >> #{@dirRuntime}/debug.log && echo '' >> #{@dirRuntime}/debug.log\" ; display-message -p '%1'"
