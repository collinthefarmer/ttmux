# @bind prefix O
# @popup-table agent
# @popup-key O detach-client

set-option -F @agentSessionName "agent@#{session_name}"

# command to create or attach to agent session
set-option -F @commandAgentSession \
"tmux new-session -A -s \"#{@agentSessionName}\" \"#{@cmdAgent}\""

# toggle: close popup if inside agent session, open with context otherwise
if-shell -F "#{m:agent@*,#{session_name}}" {
    detach-client
} {
    source-file -F "#{@dirPrograms}/context-capture.tmux.conf"
    run-shell "tmux has-session -t \"#{@agentSessionName}\" 2>/dev/null || tmux new-session -d -s \"#{@agentSessionName}\" \"#{@cmdAgent}\""
    run-shell "#{@dirTtmux}/scripts/popup-keys open agent \"#{@agentSessionName}\""
    run-shell "tmux display-popup -b rounded -w 80 -h 75% -E '#{@commandAgentSession}'"
    run-shell "#{@dirTtmux}/scripts/popup-keys close \"#{@agentSessionName}\""
}
