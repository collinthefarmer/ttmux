# @bind prefix Space
# @popup-table search
# @popup-key Space detach-client
#
# telescope: search across multiple sources with preview

set-option -F @searchSessionName "search@#{session_name}"
set-option -F @commandSearchSession \
"tmux new-session -A -s \"#{@searchSessionName}\" \"#{@dirTtmux}/scripts/telescope\""

if-shell -F "#{m:search@*,#{session_name}}" {
    detach-client
} {
    run-shell "tmux set-option -s @cmdSearch '#{@dirTtmux}/scripts/telescope'"
    # if session exists, put a fresh telescope in window 0
    run-shell "if tmux has-session -t '#{@searchSessionName}' 2>/dev/null; then tmux respawn-window -k -t '#{@searchSessionName}:1' '#{@dirTtmux}/scripts/telescope' 2>/dev/null || tmux new-window -t '#{@searchSessionName}:1' '#{@dirTtmux}/scripts/telescope'; tmux select-window -t '#{@searchSessionName}:1'; fi"
    run-shell "#{@dirTtmux}/scripts/agent-popup '#{@dirTtmux}' search search -w 90% -h 80%"
}
