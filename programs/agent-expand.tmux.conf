# @bind prefix Z
# @bind-condition #{m:agent@*,#{session_name}}
#
# agent-expand — close the current agent popup and reopen it at 80% screen size
#
# display-popup has no resize command, so we detach then reopen at the new dimensions.
# The agent session persists across the close/open cycle.

set-option -F @agentExpandSession "#{session_name}"
set-option -F @agentExpandCommand \
"tmux new-session -A -s \"#{@agentExpandSession}\" \"#{@cmdAgent}\""

detach-client
run-shell "tmux display-popup -b rounded -w 80% -h 80% -E '#{@agentExpandCommand}'"
