# command to dump ttmux state to log
set-option -F @cmdDebugDumpVars \
"echo '--- TTMUX STATE DUMP ---' >> /tmp/ttmux-debug.log && \
echo 'time: '$(date '+%H:%M:%S') >> /tmp/ttmux-debug.log && \
echo 'session: #{session_name}' >> /tmp/ttmux-debug.log && \
echo 'window: #{window_name}' >> /tmp/ttmux-debug.log && \
echo 'pane: #{pane_id}' >> /tmp/ttmux-debug.log && \
echo '' >> /tmp/ttmux-debug.log && \
echo '-- server options --' >> /tmp/ttmux-debug.log && \
tmux show-options -s | grep '^@' >> /tmp/ttmux-debug.log && \
echo '' >> /tmp/ttmux-debug.log && \
echo '-- session options --' >> /tmp/ttmux-debug.log && \
tmux show-options | grep '^@' >> /tmp/ttmux-debug.log && \
echo '' >> /tmp/ttmux-debug.log"

# main
run-shell "#{@cmdDebugDumpVars}"
display-message "ttmux: state dumped to /tmp/ttmux-debug.log"
